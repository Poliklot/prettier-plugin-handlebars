name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }} / Prettier ${{ matrix.prettier-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22
        prettier-version:
          - "3.0"
          - "3.2"
          - latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install matrix Prettier
        run: npm install --no-save --package-lock=false prettier@${{ matrix.prettier-version }}

      - name: Print versions
        run: |
          node --version
          npm --version
          node -e "console.log(require('prettier/package.json').version)"

      - name: Check
        run: npm run check

      - name: Inspect package contents
        run: npm run pack:check

      - name: Install smoke
        run: npm run smoke:install
        env:
          PRETTIER_VERSION: ${{ matrix.prettier-version }}
